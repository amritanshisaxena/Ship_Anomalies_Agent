<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FulfillAI — Fulfillment Operations Intelligence</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1117; font-family: 'Inter', system-ui, sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

    @keyframes pulse-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0.6); }
      50% { box-shadow: 0 0 0 6px rgba(59,130,246,0); }
    }
    .pulse-ring { animation: pulse-ring 1.5s ease-in-out infinite; }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in-up { animation: fade-in-up 0.4s ease forwards; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { display:inline-block; width:2px; height:1em; background:#3b82f6;
              vertical-align:text-bottom; animation:blink 1s step-end infinite; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }

    @keyframes slide-up {
      from { opacity:0; transform:translateY(40px) scale(0.95); }
      to   { opacity:1; transform:translateY(0)  scale(1); }
    }
    .slide-up { animation: slide-up 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }

    .chat-bubble-agent { background: #1e2130; border-radius: 4px 18px 18px 18px; }
    .chat-bubble-user  { background: #2563eb; border-radius: 18px 4px 18px 18px; }

    .tab-btn { position:relative; padding: 8px 20px; font-weight:600; font-size:0.9rem;
               transition: color 0.2s; }
    .tab-btn::after { content:''; position:absolute; bottom:-1px; left:0; right:0;
                      height:2px; background:#3b82f6; border-radius:2px;
                      transform: scaleX(0); transition: transform 0.2s; }
    .tab-btn.active { color:#fff; }
    .tab-btn.active::after { transform: scaleX(1); }
    .tab-btn:not(.active) { color:#6b7280; }

    .order-card { background:#161b27; border:1px solid #1f2937;
                  border-radius:12px; overflow:hidden; }
    .order-card:hover { border-color:#374151; }

    .severity-HIGH   { background:#7f1d1d; color:#fca5a5; border:1px solid #991b1b; }
    .severity-MEDIUM { background:#78350f; color:#fcd34d; border:1px solid #92400e; }
    .severity-LOW    { background:#14532d; color:#86efac; border:1px solid #166534; }
    .severity-OK     { background:#14532d; color:#86efac; border:1px solid #166534; }

    .status-Exception { background:#7f1d1d; color:#fca5a5; }
    .status-OnHold    { background:#78350f; color:#fcd34d; }
    .status-Processing{ background:#1e3a5f; color:#93c5fd; }
    .status-Completed { background:#14532d; color:#86efac; }

    .glow-blue { box-shadow: 0 0 20px rgba(59,130,246,0.3); }

    @keyframes success-pop {
      0%   { transform: scale(0.5); opacity:0; }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1);   opacity:1; }
    }
    .success-pop { animation: success-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── Stepper ────────────────────────────────────────────────────────────────
const STEPS = [
  { id: 1, label: "Store Info" },
  { id: 2, label: "Products" },
  { id: 3, label: "Inventory" },
  { id: 4, label: "Shipping" },
  { id: 5, label: "Go Live" },
];

function detectStep(messages) {
  const agentText = messages
    .filter(m => m.role === "assistant")
    .map(m => m.content.toLowerCase())
    .join(" ");

  if (agentText.includes("onboarding_complete") || agentText.includes("you're all set")) return 6;
  if (agentText.includes("shipping") || agentText.includes("carrier") || agentText.includes("ups") || agentText.includes("fedex")) return 5;
  if (agentText.includes("warehouse") || agentText.includes("east coast") || agentText.includes("west coast") || agentText.includes("central") || agentText.includes("monthly unit")) return 4;
  if (agentText.includes("sku") || agentText.includes("product categor") || agentText.includes("average order") || agentText.includes("how many")) return 3;
  if (agentText.includes("platform") || agentText.includes("shopify") || agentText.includes("store url") || agentText.includes("brand name") || agentText.includes("woocommerce")) return 2;
  return 1;
}

function Stepper({ currentStep }) {
  return (
    <div className="flex flex-col gap-4">
      {STEPS.map(step => {
        const done = currentStep > step.id;
        const active = currentStep === step.id;
        return (
          <div key={step.id} className="flex items-center gap-3">
            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm font-bold flex-shrink-0 transition-all duration-300
              ${done   ? "bg-blue-600 text-white" :
                active ? "bg-blue-600 text-white pulse-ring" :
                         "bg-gray-700 text-gray-400"}`}>
              {done ? "✓" : step.id}
            </div>
            <span className={`text-sm font-medium transition-colors duration-300
              ${done ? "text-blue-400" : active ? "text-white" : "text-gray-500"}`}>
              {step.label}
            </span>
          </div>
        );
      })}
    </div>
  );
}

// ─── Chat Message ────────────────────────────────────────────────────────────
function ChatMessage({ msg, isStreaming }) {
  const isUser = msg.role === "user";
  const text = msg.content.replace("ONBOARDING_COMPLETE:", "").replace(/__ONBOARDING_COMPLETE__/g, "").trim();
  // Strip JSON from displayed text if it's the complete message
  const displayText = text.startsWith("{") ? "" : text.replace(/ONBOARDING_COMPLETE:.*$/s, "").trim();
  const finalText = displayText || text;

  return (
    <div className={`flex gap-3 mb-4 ${isUser ? "flex-row-reverse" : "flex-row"} fade-in-up`}>
      {!isUser && (
        <div className="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-sm flex-shrink-0 mt-1">
          🤖
        </div>
      )}
      <div className={`max-w-[78%] px-4 py-3 text-sm leading-relaxed
        ${isUser ? "chat-bubble-user text-white" : "chat-bubble-agent text-gray-100"}`}>
        {finalText}
        {isStreaming && <span className="cursor ml-0.5" />}
      </div>
    </div>
  );
}

// ─── Onboarding View ────────────────────────────────────────────────────────
function OnboardingView({ onComplete }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [streamingMsg, setStreamingMsg] = useState(null);
  const bottomRef = useRef(null);
  const inputRef = useRef(null);

  const currentStep = detectStep(messages);

  const scrollToBottom = () => bottomRef.current?.scrollIntoView({ behavior: "smooth" });

  useEffect(scrollToBottom, [messages, streamingMsg]);

  // Auto-open message on mount
  useEffect(() => {
    const opening = "Hi! I'm FulfillAI, your fulfillment setup assistant. Let's get your account configured in just a few minutes. First, what's your brand name?";
    setMessages([{ role: "assistant", content: opening }]);
  }, []);

  const sendMessage = useCallback(async () => {
    const text = input.trim();
    if (!text || loading) return;
    setInput("");
    setLoading(true);

    const history = messages.map(m => ({ role: m.role, content: m.content }));
    const newMessages = [...messages, { role: "user", content: text }];
    setMessages(newMessages);

    let accumulated = "";
    setStreamingMsg({ role: "assistant", content: "" });

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, history }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (line.startsWith("event: onboarding_complete")) {
            setStreamingMsg(null);
            setMessages(prev => [...prev,
              { role: "assistant", content: accumulated }
            ]);
            setLoading(false);
            setTimeout(() => onComplete(), 400);
            return;
          }
          if (line.startsWith("event: done")) break;
          if (line.startsWith("data: ")) {
            try {
              const parsed = JSON.parse(line.slice(6));
              if (parsed.token !== undefined) {
                accumulated += parsed.token;
                setStreamingMsg({ role: "assistant", content: accumulated });
              }
            } catch {}
          }
        }
      }
    } catch (err) {
      accumulated += "\n[Connection error. Please try again.]";
    }

    setStreamingMsg(null);
    setMessages(prev => [...prev, { role: "assistant", content: accumulated }]);
    setLoading(false);
    setTimeout(() => inputRef.current?.focus(), 50);
  }, [input, loading, messages, onComplete]);

  const onKey = e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  return (
    <div className="flex gap-0 h-full">
      {/* Left: Stepper */}
      <div className="w-64 flex-shrink-0 border-r border-gray-800 p-6">
        <h3 className="text-xs font-semibold text-gray-400 uppercase tracking-widest mb-6">
          Setup Progress
        </h3>
        <Stepper currentStep={currentStep} />
      </div>

      {/* Right: Chat */}
      <div className="flex-1 flex flex-col min-w-0">
        <div className="flex-1 overflow-y-auto scrollbar-hide p-6">
          {messages.map((m, i) => <ChatMessage key={i} msg={m} isStreaming={false} />)}
          {streamingMsg && <ChatMessage msg={streamingMsg} isStreaming={true} />}
          <div ref={bottomRef} />
        </div>

        {/* Input bar */}
        <div className="border-t border-gray-800 p-4 flex gap-3 items-end">
          <textarea
            ref={inputRef}
            value={input}
            onChange={e => setInput(e.target.value)}
            onKeyDown={onKey}
            placeholder="Type your answer..."
            rows={1}
            className="flex-1 bg-gray-800 text-white placeholder-gray-500 rounded-xl px-4 py-3 resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm"
            style={{ minHeight: "48px", maxHeight: "120px" }}
          />
          <button
            onClick={sendMessage}
            disabled={loading || !input.trim()}
            className="bg-blue-600 hover:bg-blue-500 disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold px-5 py-3 rounded-xl text-sm transition-all duration-150 flex items-center gap-2"
          >
            {loading
              ? <span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full spin" />
              : "Send"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ─── Severity Badge ──────────────────────────────────────────────────────────
function SeverityBadge({ severity }) {
  if (!severity) return null;
  return (
    <span className={`text-xs font-bold px-2 py-0.5 rounded-full severity-${severity}`}>
      {severity === "HIGH" ? "🔴" : severity === "MEDIUM" ? "🟡" : "🟢"} {severity}
    </span>
  );
}

function StatusBadge({ status }) {
  return (
    <span className={`text-xs font-semibold px-2 py-0.5 rounded-full status-${status}`}>
      {status}
    </span>
  );
}

// ─── Order Card ──────────────────────────────────────────────────────────────
function OrderCard({ data, onApprove, onReject }) {
  const { order, analysis, analyzing } = data;
  const [decision, setDecision] = useState(null);
  const [rejecting, setRejecting] = useState(false);
  const [rejectReason, setRejectReason] = useState("");
  const isProblematic = order.status === "Exception" || order.status === "OnHold";
  const productName = order.products?.[0]?.name || "Unknown Product";
  const sku = order.products?.[0]?.sku || "";

  const handleApprove = async () => {
    await onApprove(order.id, analysis?.recommended_action);
    setDecision("approved");
  };

  const handleReject = async () => {
    await onReject(order.id, rejectReason || "No reason provided");
    setDecision("rejected");
    setRejecting(false);
  };

  return (
    <div className="order-card fade-in-up transition-all duration-300 hover:shadow-lg">
      {/* Header */}
      <div className="px-5 py-4 border-b border-gray-800 flex items-center gap-3 flex-wrap">
        {analysis && <SeverityBadge severity={analysis.severity} />}
        <span className="font-bold text-white">{order.order_number}</span>
        <span className="text-gray-400 text-sm">{productName}</span>
        <span className="text-xs text-gray-500 font-mono">{sku}</span>
        <div className="ml-auto flex items-center gap-2">
          <span className="text-xs text-gray-500">{order.recipient?.name}</span>
          <StatusBadge status={order.status} />
        </div>
      </div>

      {/* Body */}
      <div className="px-5 py-4">
        {analyzing ? (
          <div className="flex items-center gap-3 text-blue-400 text-sm py-2">
            <span className="w-4 h-4 border-2 border-blue-400 border-t-transparent rounded-full spin" />
            🤖 Analyzing exception...
          </div>
        ) : isProblematic && analysis ? (
          <div className="space-y-3">
            {/* Diagnosis */}
            <p className="text-gray-300 text-sm leading-relaxed">{analysis.diagnosis}</p>

            {/* Severity reason */}
            <p className="text-xs text-gray-500 italic">{analysis.severity_reason}</p>

            {/* Recommended action */}
            <div className="bg-gray-900 rounded-lg px-4 py-3">
              <p className="text-xs text-gray-400 mb-1 font-semibold uppercase tracking-wide">Recommended Action</p>
              <p className="text-white font-semibold text-sm">{analysis.recommended_action}</p>
            </div>

            {/* Merchant message */}
            <div className="border-l-2 border-gray-600 pl-3">
              <p className="text-xs text-gray-400 mb-1 font-semibold uppercase tracking-wide">Merchant Message</p>
              <p className="text-gray-400 text-sm italic leading-relaxed">{analysis.merchant_message}</p>
            </div>

            {/* Actions */}
            {!decision ? (
              <div className="pt-1">
                {!rejecting ? (
                  <div className="flex items-center gap-3">
                    <button
                      onClick={handleApprove}
                      className="bg-green-700 hover:bg-green-600 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-all"
                    >
                      ✅ Approve
                    </button>
                    <button
                      onClick={() => setRejecting(true)}
                      className="bg-red-800 hover:bg-red-700 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-all"
                    >
                      ❌ Reject
                    </button>
                    <button className="text-xs text-gray-500 hover:text-gray-300 underline transition-colors ml-1">
                      Edit
                    </button>
                  </div>
                ) : (
                  <div className="flex flex-col gap-2">
                    <input
                      value={rejectReason}
                      onChange={e => setRejectReason(e.target.value)}
                      placeholder="Reason for rejection (optional)"
                      className="bg-gray-800 text-white text-sm rounded-lg px-3 py-2 focus:outline-none focus:ring-1 focus:ring-red-500 w-full"
                    />
                    <div className="flex gap-2">
                      <button onClick={handleReject}
                        className="bg-red-700 hover:bg-red-600 text-white text-sm font-semibold px-4 py-2 rounded-lg transition-all">
                        Confirm Reject
                      </button>
                      <button onClick={() => setRejecting(false)}
                        className="text-gray-400 hover:text-gray-200 text-sm px-3 py-2 transition-colors">
                        Cancel
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ) : (
              <div className={`inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-semibold
                ${decision === "approved" ? "bg-green-900 text-green-300" : "bg-red-900 text-red-300"}`}>
                {decision === "approved" ? "✅ Approved" : "❌ Rejected"}
              </div>
            )}
          </div>
        ) : !isProblematic ? (
          <div className="flex items-center gap-2 text-green-400 text-sm">
            <span className="w-5 h-5 bg-green-900 rounded-full flex items-center justify-center text-xs">✓</span>
            Healthy — no action required
          </div>
        ) : null}
      </div>
    </div>
  );
}

// ─── Live Ops View ───────────────────────────────────────────────────────────
function LiveOpsView({ autoRun }) {
  const [orderData, setOrderData] = useState({});
  const [running, setRunning] = useState(false);
  const [done, setDone] = useState(false);
  const hasAutoRun = useRef(false);

  const runAnalysis = useCallback(async () => {
    if (running) return;
    setRunning(true);
    setDone(false);
    setOrderData({});

    try {
      const res = await fetch("/api/analyze");
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done: rdone, value } = await reader.read();
        if (rdone) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (line.startsWith("event: done")) { setDone(true); break; }
          if (line.startsWith("data: ")) {
            try {
              const parsed = JSON.parse(line.slice(6));
              setOrderData(prev => ({
                ...prev,
                [parsed.order_id]: parsed,
              }));
            } catch {}
          }
        }
      }
    } catch (err) {
      console.error(err);
    }
    setRunning(false);
    setDone(true);
  }, [running]);

  useEffect(() => {
    if (autoRun && !hasAutoRun.current) {
      hasAutoRun.current = true;
      setTimeout(runAnalysis, 600);
    }
  }, [autoRun, runAnalysis]);

  const handleApprove = async (orderId, action) => {
    await fetch("/api/approve", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ order_id: orderId, action }),
    });
  };

  const handleReject = async (orderId, reason) => {
    await fetch("/api/reject", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ order_id: orderId, reason }),
    });
  };

  // Stats
  const allCards = Object.values(orderData);
  const total = allCards.length;
  const critical = allCards.filter(d => d.analysis?.severity === "HIGH").length;
  const medium = allCards.filter(d => d.analysis?.severity === "MEDIUM").length;
  const healthy = allCards.filter(d => !d.order || (!["Exception","OnHold"].includes(d.order.status))).length;

  return (
    <div className="flex flex-col h-full">
      {/* Stats bar */}
      <div className="border-b border-gray-800 px-6 py-4 flex items-center gap-6 flex-wrap">
        <div className="flex gap-6 flex-wrap flex-1">
          <Stat label="Orders Monitored" value={total || "—"} color="text-white" />
          <Stat label="Critical" value={critical || "—"} color="text-red-400" icon="🔴" />
          <Stat label="Action Needed" value={medium || "—"} color="text-amber-400" icon="🟡" />
          <Stat label="Healthy" value={healthy || "—"} color="text-green-400" icon="🟢" />
        </div>
        <button
          onClick={runAnalysis}
          disabled={running}
          className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold px-5 py-2.5 rounded-xl text-sm transition-all glow-blue"
        >
          {running
            ? <><span className="w-4 h-4 border-2 border-white border-t-transparent rounded-full spin" /> Analyzing...</>
            : "▶ Run Analysis"}
        </button>
      </div>

      {/* Cards */}
      <div className="flex-1 overflow-y-auto scrollbar-hide p-6">
        {Object.keys(orderData).length === 0 && !running && (
          <div className="flex flex-col items-center justify-center h-64 text-gray-600">
            <div className="text-5xl mb-4">📦</div>
            <p className="text-lg font-semibold">No analysis yet</p>
            <p className="text-sm mt-1">Click "Run Analysis" to scan all orders</p>
          </div>
        )}
        <div className="grid gap-4 max-w-4xl mx-auto">
          {Object.values(orderData).map(d => (
            <OrderCard
              key={d.order_id}
              data={d}
              onApprove={handleApprove}
              onReject={handleReject}
            />
          ))}
        </div>
      </div>
    </div>
  );
}

function Stat({ label, value, color, icon }) {
  return (
    <div className="flex items-center gap-2">
      {icon && <span className="text-base">{icon}</span>}
      <div>
        <div className={`text-xl font-bold ${color}`}>{value}</div>
        <div className="text-xs text-gray-500">{label}</div>
      </div>
    </div>
  );
}

// ─── Transition Overlay ──────────────────────────────────────────────────────
function TransitionOverlay({ onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, [onDone]);
  return (
    <div className="fixed inset-0 z-50 bg-gray-950 bg-opacity-95 flex items-center justify-center">
      <div className="text-center success-pop">
        <div className="text-6xl mb-4">✅</div>
        <h2 className="text-2xl font-bold text-white mb-2">Onboarding Complete!</h2>
        <p className="text-blue-400 text-lg">Starting operations monitoring...</p>
        <div className="mt-6 flex justify-center gap-1">
          {[0,1,2].map(i => (
            <div key={i} className="w-2 h-2 bg-blue-500 rounded-full"
              style={{ animation: `blink 1s ${i*0.3}s ease-in-out infinite` }} />
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── App Root ────────────────────────────────────────────────────────────────
function App() {
  const [activeTab, setActiveTab] = useState("onboarding");
  const [showTransition, setShowTransition] = useState(false);
  const [autoRun, setAutoRun] = useState(false);

  const handleOnboardingComplete = () => {
    setShowTransition(true);
  };

  const handleTransitionDone = () => {
    setShowTransition(false);
    setActiveTab("liveops");
    setAutoRun(true);
  };

  return (
    <div className="min-h-screen flex flex-col text-white" style={{ background: "#0f1117" }}>
      {showTransition && <TransitionOverlay onDone={handleTransitionDone} />}

      {/* Header */}
      <header className="border-b border-gray-800 bg-gray-950 bg-opacity-80 backdrop-blur sticky top-0 z-40">
        <div className="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <span className="text-2xl">🚚</span>
            <div>
              <div className="font-bold text-white text-lg leading-none">FulfillAI</div>
              <div className="text-xs text-gray-500 leading-none mt-0.5">Fulfillment Operations Intelligence</div>
            </div>
          </div>
          <nav className="flex items-center border-b border-transparent gap-1">
            <button
              onClick={() => setActiveTab("onboarding")}
              className={`tab-btn ${activeTab === "onboarding" ? "active" : ""}`}
            >
              Onboarding
            </button>
            <button
              onClick={() => setActiveTab("liveops")}
              className={`tab-btn ${activeTab === "liveops" ? "active" : ""}`}
            >
              Live Ops
            </button>
          </nav>
        </div>
      </header>

      {/* Main */}
      <main className="flex-1 max-w-7xl w-full mx-auto flex flex-col" style={{ height: "calc(100vh - 64px)" }}>
        {activeTab === "onboarding"
          ? <OnboardingView onComplete={handleOnboardingComplete} />
          : <LiveOpsView autoRun={autoRun} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
