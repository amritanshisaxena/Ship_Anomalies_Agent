<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FulfillAI Shop</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0f1117; font-family: 'Inter', system-ui, sans-serif; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes fade-in-up { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    .fade-in-up { animation: fade-in-up 0.3s ease forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }

    .tab-btn { position:relative; padding:8px 18px; font-weight:600; font-size:0.82rem; transition:color 0.2s; white-space:nowrap; }
    .tab-btn::after { content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px; background:#3b82f6; border-radius:2px; transform:scaleX(0); transition:transform 0.2s; }
    .tab-btn.active { color:#fff; }
    .tab-btn.active::after { transform:scaleX(1); }
    .tab-btn:not(.active) { color:#6b7280; }
    .tab-btn:not(.active):hover { color:#9ca3af; }

    .card { background:#161b27; border:1px solid #1f2937; border-radius:12px; overflow:hidden; transition:border-color 0.2s; }
    .card:hover { border-color:#374151; }

    .status-badge { font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:9999px; }
    .st-pending { background:#1e3a5f; color:#93c5fd; }
    .st-queued { background:#312e81; color:#a5b4fc; }
    .st-picking { background:#4c1d95; color:#c4b5fd; }
    .st-packing { background:#581c87; color:#d8b4fe; }
    .st-shipped { background:#134e4a; color:#5eead4; }
    .st-in_transit { background:#164e63; color:#67e8f9; }
    .st-delivered { background:#14532d; color:#86efac; }
    .st-exception { background:#7f1d1d; color:#fca5a5; }
    .st-on_hold { background:#78350f; color:#fcd34d; }
    .st-backorder { background:#78350f; color:#fcd34d; }

    .glow-blue { box-shadow: 0 0 15px rgba(59,130,246,0.25); }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── shared ────────────────────────────────────────────────────────────────
const api = (url, opts) => fetch(url, opts).then(async r => {
  if (!r.ok) {
    const text = await r.text().catch(() => r.statusText);
    return { error: text || r.statusText || `HTTP ${r.status}` };
  }
  try { return await r.json(); } catch { return { error: "Invalid JSON response" }; }
}).catch(e => ({ error: e.message || "Network error" }));
const post = (url, body) => api(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: body ? JSON.stringify(body) : undefined });

function Spinner({ size="w-4 h-4" }) { return <span className={`inline-block ${size} border-2 border-blue-400 border-t-transparent rounded-full spin`} />; }
function StatusBadge({ status }) {
  const labels = { pending:"Placed", queued:"Queued", picking:"Picking", packing:"Packing", shipped:"Shipped", in_transit:"In Transit", delivered:"Delivered", exception:"Exception", on_hold:"On Hold", backorder:"Backorder" };
  return <span className={`status-badge st-${status}`}>{labels[status]||status}</span>;
}
function Btn({ onClick, disabled, children, color="blue", className="" }) {
  const c = { blue:"bg-blue-600 hover:bg-blue-500", green:"bg-green-700 hover:bg-green-600", red:"bg-red-800 hover:bg-red-700", gray:"bg-gray-700 hover:bg-gray-600" };
  return <button onClick={onClick} disabled={disabled} className={`${c[color]} disabled:opacity-40 disabled:cursor-not-allowed text-white font-semibold px-4 py-2 rounded-lg text-sm transition-all ${className}`}>{children}</button>;
}
function Empty({ icon, title, sub }) {
  return <div className="flex flex-col items-center justify-center py-16 text-gray-600"><div className="text-4xl mb-3">{icon}</div><p className="text-base font-semibold">{title}</p>{sub && <p className="text-sm mt-1">{sub}</p>}</div>;
}
function Input({ label, value, onChange, placeholder, type="text", className="" }) {
  return <div className={className}><label className="block text-xs text-gray-500 mb-1">{label}</label><input type={type} value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} className="w-full bg-gray-800 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" /></div>;
}
function Select({ label, value, onChange, options, className="" }) {
  return <div className={className}><label className="block text-xs text-gray-500 mb-1">{label}</label><select value={value} onChange={e=>onChange(e.target.value)} className="w-full bg-gray-800 text-white rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">{options.map(o=><option key={o.value} value={o.value}>{o.label}</option>)}</select></div>;
}

// ─── Shop ──────────────────────────────────────────────────────────────────
function ShopView({ savedIdentity, onCheckout }) {
  const [brands, setBrands] = useState([]);
  const [selectedBrand, setSelectedBrand] = useState("");
  const [catalog, setCatalog] = useState(null);
  const [cart, setCart] = useState({});
  const [checkout, setCheckout] = useState({
    name: savedIdentity?.name || "",
    city: savedIdentity?.city || "",
    state: savedIdentity?.state || "",
    tier: "standard",
    vip: false,
  });
  const [placing, setPlacing] = useState(false);
  const [error, setError] = useState(null);

  useEffect(() => {
    api("/api/brands").then(d => {
      const active = (d.brands || []).filter(b => b.status === "active");
      setBrands(active);
      if (active.length > 0 && !selectedBrand) setSelectedBrand(String(active[0].id));
    });
  }, []);

  useEffect(() => {
    if (selectedBrand) api(`/api/storefront/catalog/${selectedBrand}`).then(setCatalog);
    else setCatalog(null);
    setCart({});
  }, [selectedBrand]);

  const addToCart = (pid) => setCart(p => ({ ...p, [pid]: (p[pid] || 0) + 1 }));
  const removeFromCart = (pid) => setCart(p => { const n = { ...p }; if (n[pid] > 1) n[pid]--; else delete n[pid]; return n; });

  const cartItems = Object.entries(cart).map(([pid, qty]) => {
    const p = catalog?.products?.find(p => p.id === parseInt(pid));
    return p ? { ...p, qty } : null;
  }).filter(Boolean);
  const cartTotal = cartItems.reduce((s, i) => s + i.qty * i.price, 0);

  const placeOrder = async () => {
    if (cartItems.length === 0 || !checkout.name.trim() || !checkout.city.trim() || !checkout.state.trim()) return;
    setPlacing(true);
    setError(null);
    try {
      const res = await post("/api/storefront/checkout", {
        brand_id: parseInt(selectedBrand),
        items: cartItems.map(i => ({ product_id: i.id, quantity: i.qty })),
        recipient_name: checkout.name.trim(),
        recipient_city: checkout.city.trim(),
        recipient_state: checkout.state.trim().toUpperCase(),
        shipping_tier: checkout.tier,
        is_vip: checkout.vip,
      });
      if (res.error) {
        setError(res.error);
      } else {
        setCart({});
        onCheckout({
          identity: {
            name: checkout.name.trim(),
            city: checkout.city.trim(),
            state: checkout.state.trim().toUpperCase(),
          },
          orderId: res.order_id,
        });
      }
    } finally { setPlacing(false); }
  };

  return (
    <div className="flex h-full">
      <div className="flex-1 overflow-y-auto scrollbar-hide p-6">
        <div className="max-w-4xl mx-auto">
          <div className="flex items-center gap-4 mb-6">
            <Select label="Brand" value={selectedBrand} onChange={setSelectedBrand}
              options={[{ value: "", label: "Choose a brand…" }, ...brands.map(b => ({ value: String(b.id), label: b.name }))]} className="w-64" />
          </div>

          {!selectedBrand && <Empty icon="🛒" title="Pick a brand to start shopping" />}

          {catalog?.error && <Empty icon="⚠" title="Catalog unavailable" sub={catalog.error} />}

          {catalog && !catalog.error && (
            <>
              <h2 className="text-2xl font-bold text-white mb-1">{catalog.brand?.name}</h2>
              <p className="text-sm text-gray-500 mb-4">Powered by FulfillAI — reliable, fast delivery</p>

              {catalog.products?.length === 0 ? <Empty icon="📦" title="No products yet" /> : (
                <div className="grid grid-cols-2 lg:grid-cols-3 gap-4">
                  {catalog.products.map(p => (
                    <div key={p.id} className="card p-4 fade-in-up">
                      <div className="flex items-start justify-between mb-2">
                        <div className="min-w-0 pr-2">
                          <p className="text-white font-semibold truncate">{p.name}</p>
                          <p className="text-xs text-gray-500 font-mono">{p.sku}</p>
                        </div>
                        <span className="text-green-400 font-bold whitespace-nowrap">${p.price?.toFixed(2)}</span>
                      </div>
                      <div className="flex items-center justify-between mt-3">
                        <span className={`text-xs ${p.stock > 10 ? 'text-green-400' : p.stock > 0 ? 'text-amber-400' : 'text-red-400'}`}>
                          {p.stock > 0 ? `${p.stock} in stock` : "Out of stock"}
                        </span>
                        {cart[p.id] ? (
                          <div className="flex items-center gap-2">
                            <button onClick={() => removeFromCart(p.id)} className="w-6 h-6 rounded bg-gray-700 text-white text-sm flex items-center justify-center">−</button>
                            <span className="text-white text-sm font-semibold w-4 text-center">{cart[p.id]}</span>
                            <button onClick={() => addToCart(p.id)} className="w-6 h-6 rounded bg-blue-600 text-white text-sm flex items-center justify-center">+</button>
                          </div>
                        ) : (
                          <Btn onClick={() => addToCart(p.id)} disabled={!p.in_stock} className="!text-xs !px-3 !py-1">Add</Btn>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </>
          )}
        </div>
      </div>

      {/* Cart sidebar */}
      <div className="w-80 border-l border-gray-800 flex flex-col">
        <div className="p-4 border-b border-gray-800">
          <h3 className="text-sm font-semibold text-gray-400 uppercase">Your cart ({cartItems.reduce((s, i) => s + i.qty, 0)} items)</h3>
        </div>
        <div className="flex-1 overflow-y-auto scrollbar-hide p-4">
          {cartItems.length === 0 ? (
            <p className="text-gray-600 text-sm text-center mt-8">Cart is empty</p>
          ) : (
            <div className="space-y-3">
              {cartItems.map(item => (
                <div key={item.id} className="flex items-center justify-between text-sm">
                  <div className="min-w-0 pr-2">
                    <p className="text-gray-300 truncate">{item.name}</p>
                    <p className="text-xs text-gray-500">×{item.qty} @ ${item.price?.toFixed(2)}</p>
                  </div>
                  <span className="text-green-400 font-semibold whitespace-nowrap">${(item.qty * item.price).toFixed(2)}</span>
                </div>
              ))}
              <div className="border-t border-gray-700 pt-2 flex justify-between text-white font-bold">
                <span>Total</span>
                <span>${cartTotal.toFixed(2)}</span>
              </div>
            </div>
          )}
        </div>

        {cartItems.length > 0 && (
          <div className="p-4 border-t border-gray-800 space-y-3">
            <Input label="Your name" value={checkout.name} onChange={v => setCheckout({ ...checkout, name: v })} placeholder="Jane Doe" />
            <div className="grid grid-cols-2 gap-2">
              <Input label="City" value={checkout.city} onChange={v => setCheckout({ ...checkout, city: v })} placeholder="Austin" />
              <Input label="State" value={checkout.state} onChange={v => setCheckout({ ...checkout, state: v })} placeholder="TX" />
            </div>
            <Select label="Shipping" value={checkout.tier} onChange={v => setCheckout({ ...checkout, tier: v })}
              options={[{ value: "standard", label: "Standard (5 days)" }, { value: "express", label: "Express (2–3 days)" }, { value: "overnight", label: "Overnight (1 day)" }]} />
            <label className="flex items-center gap-2 text-sm text-gray-400 cursor-pointer">
              <input type="checkbox" checked={checkout.vip} onChange={e => setCheckout({ ...checkout, vip: e.target.checked })} className="rounded" />
              I'm a VIP member
            </label>
            {error && <p className="text-xs text-red-400">{error}</p>}
            <Btn onClick={placeOrder} disabled={placing || !checkout.name.trim() || !checkout.state.trim()} className="w-full glow-blue">
              {placing ? <><Spinner /> Placing order…</> : `Place order — $${cartTotal.toFixed(2)}`}
            </Btn>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── Confirmation ──────────────────────────────────────────────────────────
function ConfirmationView({ orderId, onViewOrders, onShopMore }) {
  const [order, setOrder] = useState(null);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    if (!orderId) return;
    api(`/api/orders/${orderId}`).then(d => {
      setOrder(d);
      setLoading(false);
    });
  }, [orderId]);

  if (loading) return <div className="flex-1 flex items-center justify-center"><Spinner /></div>;
  if (!order || order.error) return <Empty icon="⚠" title="Order not found" sub={order?.error} />;

  const shipment = order.shipments?.[0];

  return (
    <div className="flex-1 overflow-y-auto scrollbar-hide p-6">
      <div className="max-w-2xl mx-auto fade-in-up">
        <div className="card p-8 text-center mb-6">
          <div className="text-5xl mb-4">✓</div>
          <h1 className="text-3xl font-bold text-white mb-2">Order confirmed!</h1>
          <p className="text-gray-400">Thanks, {order.recipient_name}. We've received your order.</p>
          <div className="mt-4 inline-block bg-gray-800 rounded-lg px-4 py-2">
            <span className="text-xs text-gray-500 uppercase">Order number</span>
            <p className="text-lg font-mono text-blue-400">{order.order_number}</p>
          </div>
        </div>

        <div className="card p-6 mb-4">
          <h3 className="text-sm font-semibold text-gray-400 uppercase mb-4">Order details</h3>
          <div className="flex items-center gap-3 mb-4">
            <StatusBadge status={order.status} />
            <span className="text-sm text-gray-500">Shipping to {order.recipient_city}, {order.recipient_state}</span>
          </div>

          <div className="space-y-2 mb-4">
            {order.items?.map((item, i) => (
              <div key={i} className="flex justify-between text-sm">
                <span className="text-gray-300">{item.name} <span className="text-gray-600">×{item.quantity}</span></span>
                <span className="text-gray-400">${((item.unit_price || 0) * item.quantity).toFixed(2)}</span>
              </div>
            ))}
            <div className="border-t border-gray-700 pt-2 flex justify-between text-white font-bold">
              <span>Total</span>
              <span className="text-green-400">${order.total?.toFixed(2)}</span>
            </div>
          </div>

          {shipment && (
            <div className="border-t border-gray-800 pt-4 space-y-2">
              <div className="text-xs uppercase text-gray-500 font-semibold">Shipping</div>
              {shipment.carrier && (
                <p className="text-sm text-gray-300">
                  Carrier: <span className="font-semibold">{shipment.carrier}</span>
                  {shipment.carrier_service && <span className="text-gray-500"> ({shipment.carrier_service})</span>}
                </p>
              )}
              {shipment.tracking_number && (
                <p className="text-sm">
                  <span className="text-gray-500">Tracking: </span>
                  <span className="text-blue-400 font-mono">{shipment.tracking_number}</span>
                </p>
              )}
              {shipment.estimated_delivery && (
                <p className="text-sm text-gray-300">
                  Estimated delivery: <span className="font-semibold">{new Date(shipment.estimated_delivery).toLocaleDateString()}</span>
                </p>
              )}
              {shipment.shipping_cost !== null && shipment.shipping_cost !== undefined && (
                <p className="text-sm text-gray-500">Shipping cost: ${shipment.shipping_cost?.toFixed(2)}</p>
              )}
            </div>
          )}
        </div>

        <div className="flex gap-3 justify-center">
          <Btn onClick={onViewOrders} color="blue">View my orders</Btn>
          <Btn onClick={onShopMore} color="gray">Continue shopping</Btn>
        </div>
      </div>
    </div>
  );
}

// ─── My Orders ─────────────────────────────────────────────────────────────
function NotificationBanner({ notif }) {
  return (
    <div className="bg-amber-900/30 border border-amber-700 rounded-lg p-4 mb-3">
      <div className="flex items-start gap-3">
        <div className="text-2xl">📣</div>
        <div className="flex-1 min-w-0">
          <p className="text-[10px] uppercase font-bold text-amber-400 tracking-wide mb-1">Delivery update from FulfillAI</p>
          <p className="text-sm font-bold text-amber-100 mb-2">{notif.subject}</p>
          <p className="text-sm text-amber-100/80 whitespace-pre-wrap">{notif.body}</p>
          {notif.sent_at && <p className="text-[10px] text-amber-400/70 mt-2">Sent {new Date(notif.sent_at).toLocaleString()}</p>}
        </div>
      </div>
    </div>
  );
}

function OrderTimeline({ order }) {
  const [detail, setDetail] = useState(null);

  useEffect(() => {
    api(`/api/orders/${order.id}`).then(setDetail);
  }, [order.id]);

  if (!detail) return <div className="text-xs text-gray-600 ml-2">Loading tracking…</div>;

  const allEvents = (detail.shipments || []).flatMap(s => s.events || []);
  allEvents.sort((a, b) => (a.occurred_at || "").localeCompare(b.occurred_at || ""));

  return (
    <div className="ml-2 mt-2 border-l-2 border-gray-800 pl-3 space-y-1">
      {allEvents.length === 0 ? (
        <p className="text-xs text-gray-600">No shipping events yet</p>
      ) : (
        allEvents.map((e, i) => (
          <div key={i} className="text-xs">
            <span className="text-gray-300">{e.message || e.status}</span>
            {e.location && <span className="text-gray-600"> · {e.location}</span>}
            <span className="text-gray-700"> · {e.occurred_at ? new Date(e.occurred_at).toLocaleString() : ""}</span>
          </div>
        ))
      )}
    </div>
  );
}

function MyOrdersView({ identity }) {
  const [orders, setOrders] = useState([]);
  const [loading, setLoading] = useState(true);
  const [expanded, setExpanded] = useState({});

  const load = useCallback(async () => {
    setLoading(true);
    const res = await api("/api/orders");
    if (res.orders) {
      const mine = res.orders.filter(o =>
        identity?.name && o.recipient_name &&
        o.recipient_name.trim().toLowerCase() === identity.name.trim().toLowerCase()
      );
      setOrders(mine);
    }
    setLoading(false);
  }, [identity?.name]);

  useEffect(() => { load(); }, [load]);
  useEffect(() => { const iv = setInterval(load, 10000); return () => clearInterval(iv); }, [load]);

  if (!identity?.name) {
    return <Empty icon="👤" title="Place an order first" sub="Your orders will show up here after checkout." />;
  }

  if (loading && orders.length === 0) {
    return <div className="flex items-center justify-center py-20"><Spinner /></div>;
  }

  if (orders.length === 0) {
    return <Empty icon="📦" title="No orders yet" sub={`Nothing under "${identity.name}"`} />;
  }

  return (
    <div className="flex-1 overflow-y-auto scrollbar-hide p-6">
      <div className="max-w-3xl mx-auto">
        <h2 className="text-xl font-bold text-white mb-1">Hi {identity.name.split(" ")[0]}</h2>
        <p className="text-sm text-gray-500 mb-6">You have {orders.length} order{orders.length === 1 ? "" : "s"}</p>

        <div className="space-y-4">
          {orders.map(o => (
            <div key={o.id} className="card p-5 fade-in-up">
              {/* Notification banners first — the loop-closing moment */}
              {o.notifications?.map(n => <NotificationBanner key={n.id} notif={n} />)}

              <div className="flex items-center gap-3 flex-wrap">
                <span className="font-mono text-sm text-blue-400">{o.order_number}</span>
                <StatusBadge status={o.status} />
                <span className="text-xs text-gray-500">{o.brand_name}</span>
                <span className="text-xs text-gray-600 ml-auto">{o.created_at ? new Date(o.created_at).toLocaleDateString() : ""}</span>
              </div>

              <div className="mt-3 flex items-center justify-between">
                <div className="text-sm text-gray-400">
                  {o.items?.length} item{o.items?.length === 1 ? "" : "s"}: {o.items?.map(i => i.name).join(", ")}
                </div>
                <span className="text-green-400 font-semibold">${o.total?.toFixed(2)}</span>
              </div>

              {o.shipments?.length > 0 && o.shipments[0].tracking_number && (
                <p className="text-xs text-gray-500 mt-2">
                  Tracking: <span className="text-blue-400 font-mono">{o.shipments[0].tracking_number}</span>
                </p>
              )}

              <button
                onClick={() => setExpanded(p => ({ ...p, [o.id]: !p[o.id] }))}
                className="text-xs text-blue-400 hover:text-blue-300 mt-2"
              >
                {expanded[o.id] ? "▲ Hide tracking" : "▼ Show tracking timeline"}
              </button>
              {expanded[o.id] && <OrderTimeline order={o} />}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── App ───────────────────────────────────────────────────────────────────
const IDENTITY_KEY = "fulfillai_shop_identity";

function App() {
  const [tab, setTab] = useState("shop");
  const [identity, setIdentity] = useState(() => {
    try { return JSON.parse(localStorage.getItem(IDENTITY_KEY) || "null"); } catch { return null; }
  });
  const [lastOrderId, setLastOrderId] = useState(null);

  const handleCheckout = ({ identity: newIdentity, orderId }) => {
    setIdentity(newIdentity);
    localStorage.setItem(IDENTITY_KEY, JSON.stringify(newIdentity));
    setLastOrderId(orderId);
    setTab("confirmation");
  };

  const TABS = [
    { id: "shop", label: "Shop" },
    ...(lastOrderId ? [{ id: "confirmation", label: "Confirmation" }] : []),
    { id: "orders", label: "My Orders" },
  ];

  return (
    <div className="min-h-screen flex flex-col text-white" style={{ background: "#0f1117" }}>
      <header className="border-b border-gray-800 bg-gray-950 bg-opacity-80 backdrop-blur sticky top-0 z-40">
        <div className="max-w-full mx-auto px-6 h-14 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <span className="text-xl">🛍️</span>
            <div>
              <div className="font-bold text-white text-base leading-none">FulfillAI Shop</div>
              <div className="text-[10px] text-gray-500 leading-none mt-0.5">Fast, reliable delivery powered by AI</div>
            </div>
          </div>
          <nav className="flex items-center gap-0.5">
            {TABS.map(t => (
              <button key={t.id} onClick={() => setTab(t.id)} className={`tab-btn ${tab === t.id ? "active" : ""}`}>{t.label}</button>
            ))}
          </nav>
          <div className="text-xs text-gray-500">
            {identity?.name ? <>Shopping as <span className="text-gray-300">{identity.name}</span></> : "Guest"}
          </div>
        </div>
      </header>

      <main className="flex-1 flex flex-col min-h-0 overflow-hidden">
        {tab === "shop" && <ShopView savedIdentity={identity} onCheckout={handleCheckout} />}
        {tab === "confirmation" && lastOrderId && (
          <ConfirmationView
            orderId={lastOrderId}
            onViewOrders={() => setTab("orders")}
            onShopMore={() => setTab("shop")}
          />
        )}
        {tab === "orders" && <MyOrdersView identity={identity} />}
      </main>

      <footer className="border-t border-gray-800 bg-gray-950 px-6 py-2 flex items-center justify-between text-xs text-gray-600">
        <span>Need help? <a href="mailto:support@fulfillai.com" className="text-blue-400">support@fulfillai.com</a></span>
        <a href="/" className="text-gray-500 hover:text-gray-300">Operations portal ↗</a>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
